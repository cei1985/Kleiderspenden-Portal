<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestätigung - IU Kleiderspende e.V.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container shadow-sm bg-white min-vh-100">
        <header class="d-flex flex-wrap justify-content-between align-items-center py-3 mb-4 border-bottom px-3">
            <div class="d-flex align-items-center">
                <!-- Logo wie oben -->
                <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 24 24" class="me-3"><path d="M2 8l10-5 10 5-10 5-10-5z" fill="#0d6efd" /><path d="M6 10v3c0 1 2 2 6 2s6-1 6-2v-3" stroke="#0d6efd" fill="none" stroke-width="1.5" /><path d="M12 13v-1" stroke="#0d6efd" stroke-width="2" /><path d="M4 19c2-2 4-3 8-3s6 1 8 3" stroke="#0d6efd" stroke-width="2.5" fill="none" stroke-linecap="round" /></svg>
                <div><h1 class="h3 fw-bold text-primary mb-0">IU Kleiderspende e.V.</h1><small class="text-muted">Akademie trifft Hilfe!</small></div>
            </div>
            <nav><ul class="nav nav-pills"><li class="nav-item"><a href="index.html" class="nav-link text-secondary">Home</a></li><li class="nav-item"><a href="registrierung.html" class="nav-link text-secondary">Spende registrieren</a></li></ul></nav>
        </header>

        <main class="row justify-content-center py-5">
            <div class="col-lg-6 text-center">
                <div class="card border-success shadow-sm p-4">
                    <div class="mb-3 text-success">
                        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-check-circle-fill" viewBox="0 0 16 16">
                            <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                        </svg>
                    </div>
                    <h2 class="text-success mb-4">Registrierung erfolgreich! [2]</h2>
                    <div class="text-start bg-light p-3 rounded border">
                        <p><strong>Art der Kleider:</strong> <span id="resArt"></span></p>
                        <p><strong>Krisengebiet:</strong> <span id="resGebiet"></span></p>
                        <p><strong>Ort der Übergabe:</strong> <span id="resOrt"></span></p>
                        <p><strong>Datum:</strong> <span id="resDatum"></span></p>
                        <p><strong>Uhrzeit:</strong> <span id="resZeit"></span></p>
                    </div>
                    <a href="index.html" class="btn btn-outline-primary mt-4">Zurück zur Startseite</a>
                </div>
            </div>
        </main>
        <footer class="py-3 mt-4 border-top text-center text-muted">
    <p>&copy; 2026 IU Kleiderspende e.V. | 
       <a href="#" class="text-decoration-none">Impressum</a> | 
       <a href="#" class="text-decoration-none">Datenschutz</a>
    </p>
</footer>
    </div>
    <script>
        document.getElementById('resArt').innerText = localStorage.getItem('art');
        document.getElementById('resGebiet').innerText = localStorage.getItem('gebiet');
        document.getElementById('resOrt').innerText = localStorage.getItem('ort');
        document.getElementById('resDatum').innerText = localStorage.getItem('datum');
        document.getElementById('resZeit').innerText = localStorage.getItem('zeit');
    </script>
